services:
  postgres:
    image: postgres:17-alpine
    container_name: reminder-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reminder
      POSTGRES_PASSWORD: reminder
      POSTGRES_DB: reminder_app
    ports:
      - '5432:5432'
    volumes:
      - reminder-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U reminder -d reminder_app']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  reminder-pgdata:
